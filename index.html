<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDD Онлайн Тесті 2026</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 15px; background: #f0f4f8; color: #333; }
        h1 { text-align: center; color: #1e3a8a; font-size: 20pt; margin-bottom: 25px; }
        .menu-btn { display: block; width: 100%; padding: 15px; font-size: 13pt; font-weight: bold; cursor: pointer; margin-bottom: 12px; border: none; border-radius: 8px; background: #2563eb; color: white; transition: background 0.2s; }
        .menu-btn:hover { background: #1d4ed8; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-top: 15px; }
        #question-text { font-size: 13pt; font-weight: bold; margin-top: 0; line-height: 1.4; color: #1e293b; }
        .option-btn { display: block; width: 100%; text-align: left; padding: 14px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 8px; background: #fff; cursor: pointer; font-size: 11pt; line-height: 1.3; }
        .option-btn:hover { background: #f8fafc; }
        .correct { background: #d1fae5 !important; border-color: #10b981 !important; color: #065f46; font-weight: bold; }
        .incorrect { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; }
        #feedback { font-weight: bold; margin: 15px 0; font-size: 12pt; text-align: center; }
        .hidden { display: none; }
        #info-bar { display: flex; justify-content: space-between; font-size: 11pt; font-weight: bold; color: #64748b; margin-bottom: 10px; padding: 0 5px; }
        #timer { color: #dc2626; }
        .nav-btn { background: #475569; }
        .nav-btn:hover { background: #334155; }
    </style>
</head>
<body>

    <h1>🚗 ЖҚЕ Онлайн Тесті</h1>
    
    <div id="mode-selection">
        <button class="menu-btn" onclick="startPractice()">🔄 Марафон (Барлық сұрақтар)</button>
        <button class="menu-btn" onclick="startExam()">⏱ Емтихан (40 сұрақ)</button>
    </div>

    <div id="quiz-area" class="hidden">
        <div id="info-bar">
            <span id="progress">Сұрақ: 1 / 40</span>
            <span id="timer" class="hidden">Қалған уақыт: 40:00</span>
        </div>

        <div class="card">
            <p id="question-text">Жүктелуде...</p>
            <div id="options-container"></div>
            <div id="feedback"></div>
            <button id="next-btn" class="menu-btn nav-btn" onclick="nextQuestion()">Келесі ➡️</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
