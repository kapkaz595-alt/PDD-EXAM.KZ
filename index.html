<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЖҚЕ Жаттықтырушы 2026</title>
    
    <!-- 🔗 这一行就是桥梁，它把刚才那个 style.css 文件连接到这个 HTML 里 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🌓 模式切换栏 -->
    <div class="top-bar">
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙 Түнгі режим</button>
    </div>

    <h1>🚗 ЖҚЕ Жаттықтырушы</h1>
    
    <div id="mode-selection">
        <button class="menu-btn" onclick="startPractice()">🔄 Жаттығу (Есте сақтау режимі)</button>
        <div id="practice-stats" class="stats-text">Жүктелуде...</div>
        
        <button class="menu-btn" onclick="startExam()">⏱ Емтихан (40 сұрақ)</button>
        
        <!-- ❌ 错题本功能按钮 -->
        <button id="wrong-questions-btn" class="menu-btn wrong-btn" onclick="startWrongPractice()" disabled>
            ❌ Қателермен жұмыс (<span id="wrong-count">0</span>)
        </button>
        
        <a id="reset-btn" class="reset-link hidden" onclick="resetProgress()">🔄 Прогресті нөлдеу (Шешімдерді тазалау)</a>
        
        <div class="counter-box">
            <div class="counter-title">👀 Сайтты көргендер саны (Просмотры):</div>
            <img src="https://count.getloli.com/get/@pdd-exam-kz-kapkaz?theme=gelbooru" alt="Visitor Count" style="max-height: 35px; vertical-align: middle;" />
        </div>
    </div>

    <div id="quiz-area" class="hidden">
        
        <div style="display: flex; justify-content: flex-start; align-items: center; margin-bottom: 12px;">
            <button class="exit-link" onclick="backToHome()">
                ⬅ Шығу
            </button>
        </div>

        <div class="progress-container">
            <div id="p-bar" class="progress-bar"></div>
        </div>
        <div id="info-bar">
            <span id="progress">Сұрақ: 1</span>
            <span id="timer" class="hidden">Қалған уақыт: 40:00</span>
        </div>

        <div class="card">
            <p id="question-text">Жүктелуде...</p>
            
            <!-- 💡 媒体展示区域 -->
            <div id="media-block" class="media-container"></div>
            
            <div id="options-container"></div>
            
            <div id="explanation-block" class="explanation-box">
                <div class="explanation-title">🔵 Түсініктеме</div>
                <div id="explanation-content" class="explanation-text"></div>
            </div>
            
            <div id="feedback"></div>
            <button id="next-btn" class="menu-btn nav-btn hidden" onclick="nextQuestion()">Келесі ➡️</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
